<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>ANDON — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--red:#E24B4A;--teal:#1D9E75;--bg:#0f1117;--surf:#1a1d26;--surf2:#22263a;--bdr:rgba(255,255,255,0.09);--txt:#f0f2f8;--muted:#8a90a8;--fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:var(--fb);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.login-box{width:100%;max-width:340px;background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:28px 24px;text-align:center;}
.logo{font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:4px;margin-bottom:6px;}
.logo span{color:var(--red);}
.sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}
.main-box{width:100%;max-width:480px;display:none;flex-direction:column;gap:14px;}
input[type=password],input[type=text]{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:var(--fb);font-size:15px;padding:11px 14px;outline:none;margin-bottom:10px;}
input::placeholder{color:var(--muted);}
.btn{width:100%;padding:12px;border-radius:8px;border:none;cursor:pointer;font-family:var(--fd);font-size:16px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
.btn-primary{background:var(--red);color:#fff;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-sm{width:auto;padding:7px 14px;font-size:12px;border-radius:6px;border:1px solid var(--bdr);background:none;color:var(--muted);cursor:pointer;font-family:var(--fd);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.section-title{font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;}
.palette-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.pal-row{display:flex;align-items:center;gap:8px;}
.pal-name{flex:1;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:var(--fb);font-size:14px;padding:7px 10px;outline:none;}
.del-btn{background:rgba(226,75,74,0.15);border:1px solid rgba(226,75,74,0.3);color:#F09595;border-radius:6px;padding:7px 12px;cursor:pointer;font-size:13px;flex-shrink:0;}
.add-row{display:flex;gap:8px;align-items:center;}
.add-row input{margin:0;flex:1;}
.toast{display:none;padding:10px 16px;background:rgba(29,158,117,0.15);border:1px solid var(--teal);border-radius:8px;color:#5DCAA5;font-size:13px;font-family:var(--fd);font-weight:600;text-align:center;margin-top:4px;}
.toast.show{display:block;}
.toast.err{background:rgba(226,75,74,0.15);border-color:var(--red);color:#F09595;}
.pw-err{color:#F09595;font-size:12px;margin-top:6px;display:none;}
.pw-err.show{display:block;}
.conn-status{font-size:11px;text-align:center;padding:6px;border-radius:6px;margin-bottom:8px;}
.conn-status.ok{background:rgba(29,158,117,0.1);color:#5DCAA5;}
.conn-status.err{background:rgba(226,75,74,0.1);color:#F09595;}
</style>
</head>
<body>

<div class="login-box" id="login-box">
  <div class="logo">AN<span>D</span>ON</div>
  <div class="sub">Administration</div>
  <div class="conn-status" id="conn-status">Connexion Firebase...</div>
  <input type="password" id="pw-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
  <div class="pw-err" id="pw-err">Mot de passe incorrect</div>
  <button class="btn btn-primary" onclick="doLogin()">Connexion</button>
</div>

<div class="main-box" id="admin-panel">
  <div style="text-align:center;margin-bottom:4px;">
    <div class="logo">AN<span>D</span>ON</div>
    <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;">Gestion des palettes</div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="card">
    <div class="section-title">Grandeurs de palettes</div>
    <div class="palette-list" id="palette-list"></div>
    <div class="add-row">
      <input type="text" id="new-palette" placeholder="Ex: 48x40" onkeydown="if(event.key==='Enter')addPalette()">
      <button class="btn-sm" onclick="addPalette()">+ Ajouter</button>
    </div>
  </div>
  <button class="btn btn-teal" onclick="saveConfig()" style="margin-top:4px;">Sauvegarder en ligne</button>
  <button class="btn-sm" style="width:100%;margin-top:6px;text-align:center;" onclick="logout()">Deconnexion</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyB24gRhCvIBE3HY-teVwr-GTtKA6Pk13A8",
    authDomain:        "andonjit.firebaseapp.com",
    databaseURL:       "https://andonjit-default-rtdb.firebaseio.com",
    projectId:         "andonjit",
    storageBucket:     "andonjit.firebasestorage.app",
    messagingSenderId: "861389965341",
    appId:             "1:861389965341:web:48de1a98ee556b2cdc5ef4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const configRef = ref(db, 'config');

  var palettes = [];
  var adminPassword = 'andon2024';
  var connected = false;

  // Load config from Firebase
  onValue(ref(db, '.info/connected'), function(snap) {
    connected = snap.val() === true;
    var el = document.getElementById('conn-status');
    el.textContent = connected ? '● Firebase connecte' : '● Firebase deconnecte';
    el.className = 'conn-status ' + (connected ? 'ok' : 'err');
  });

  get(configRef).then(function(snap) {
    var data = snap.val();
    if (data) {
      palettes = data.palettes || [];
      adminPassword = data.adminPassword || 'andon2024';
    } else {
      // First time — load from config.json fallback
      fetch('config.json').then(function(r){ return r.json(); }).then(function(c){
        palettes = c.palettes || [];
        adminPassword = c.adminPassword || 'andon2024';
      }).catch(function(){});
    }
  }).catch(function(e){ console.warn('Firebase config load error:', e); });

  // ── Auth ──────────────────────────────────────────────────────────────────
  window.doLogin = function() {
    var pw = document.getElementById('pw-input').value;
    if (pw === adminPassword) {
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'flex';
      renderPalettes();
    } else {
      document.getElementById('pw-err').classList.add('show');
      document.getElementById('pw-input').value = '';
      setTimeout(function(){ document.getElementById('pw-err').classList.remove('show'); }, 2000);
    }
  };

  window.logout = function() {
    document.getElementById('login-box').style.display = '';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('pw-input').value = '';
  };

  // ── Palette management ────────────────────────────────────────────────────
  function renderPalettes() {
    var list = document.getElementById('palette-list');
    list.innerHTML = '';
    palettes.forEach(function(p, i) {
      var row = document.createElement('div');
      row.className = 'pal-row';
      row.innerHTML = '<input class="pal-name" type="text" value="' + esc(p) + '" onchange="palettes[' + i + ']=this.value">'
        + '<button class="del-btn" onclick="removePalette(' + i + ')">&#10005;</button>';
      list.appendChild(row);
    });
  }

  window.addPalette = function() {
    var v = document.getElementById('new-palette').value.trim();
    if (!v) return;
    palettes.push(v);
    document.getElementById('new-palette').value = '';
    renderPalettes();
  };

  window.removePalette = function(i) {
    palettes.splice(i, 1);
    renderPalettes();
  };

  // Save directly to Firebase — all devices get new palettes instantly
  window.saveConfig = function() {
    if (!connected) {
      showToast('Firebase non connecte. Verifiez votre connexion.', true);
      return;
    }
    set(configRef, { palettes: palettes, adminPassword: adminPassword })
      .then(function() {
        showToast('Sauvegarde en ligne reussie &#10003; — Tous les operateurs voient les nouvelles dimensions immediatement.');
      })
      .catch(function(e) {
        showToast('Erreur de sauvegarde: ' + e.message, true);
      });
  };

  function showToast(msg, isErr) {
    var t = document.getElementById('toast');
    t.innerHTML = msg;
    t.className = 'toast show' + (isErr ? ' err' : '');
    setTimeout(function(){ t.classList.remove('show'); }, 4000);
  }

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
